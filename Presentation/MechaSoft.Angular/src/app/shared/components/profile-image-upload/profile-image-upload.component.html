<div class="profile-image-upload">
  <!-- Current/Preview Image -->
  <div class="image-container">
    <div class="image-wrapper">
      <img
        [src]="hasPreview ? imagePreview : displayImageUrl"
        [alt]="hasPreview ? 'Preview' : 'Profile'"
        class="profile-image"
        [class.preview]="hasPreview"
      />
      @if (isUploading) {
      <div class="loading-overlay">
        <div class="spinner"></div>
      </div>
      }
    </div>
  </div>

  <!-- Upload Area -->
  @if (!hasPreview) {
  <div
    class="upload-area"
    [class.dragging]="isDragging"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <input
      type="file"
      #fileInput
      accept="image/jpeg,image/jpg,image/png,image/webp,image/gif"
      (change)="onFileSelected($event)"
      class="file-input"
      id="profileImageInput"
    />

    <label for="profileImageInput" class="upload-label">
      <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
        />
      </svg>
      <span class="upload-text">Clique ou arraste uma imagem</span>
      <span class="upload-hint">JPG, PNG, WEBP ou GIF (máx. 5MB)</span>
    </label>
  </div>
  }

  <!-- Preview Actions -->
  @if (hasPreview && !isUploading) {
  <div class="preview-actions">
    <button type="button" class="btn-cancel" (click)="cancelSelection()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
      Cancelar
    </button>
    <button type="button" class="btn-upload" (click)="uploadImage()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
        />
      </svg>
      Fazer Upload
    </button>
  </div>
  }

  <!-- Error Message -->
  @if (errorMessage) {
  <div class="error-message">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
      />
    </svg>
    <span>{{ errorMessage }}</span>
  </div>
  }
</div>
