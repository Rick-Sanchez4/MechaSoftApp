<div class="profile-image-upload">
  <!-- Avatar + Upload zone (unified block) -->
  <div
    class="avatar-upload-block"
    [class.dragging]="isDragging"
    [class.has-image]="displayImageUrl || hasPreview"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <input
      type="file"
      #fileInput
      accept="image/jpeg,image/jpg,image/png,image/webp,image/gif"
      (change)="onFileSelected($event)"
      class="file-input"
      id="profileImageInput"
    />

    <!-- Avatar circle -->
    <div class="image-container">
      <div class="image-wrapper" [class.preview-mode]="hasPreview">
        <img
          [src]="hasPreview ? imagePreview : displayImageUrl"
          [alt]="hasPreview ? 'Preview' : 'Foto de perfil'"
          class="profile-image"
          [class.preview]="hasPreview"
        />
        @if (isUploading) {
        <div class="loading-overlay">
          <div class="spinner"></div>
          <span class="loading-text">A guardar...</span>
        </div>
        }
        @if (!hasPreview && !isUploading) {
        <label for="profileImageInput" class="avatar-edit-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 13v4a2 2 0 01-2 2H7a2 2 0 01-2-2v-4" />
          </svg>
          <span>Alterar</span>
        </label>
        }
      </div>
    </div>

    <!-- Compact upload CTA (when no preview) -->
    @if (!hasPreview) {
    <label for="profileImageInput" class="upload-cta">
      <span class="upload-cta-main">Alterar foto de perfil</span>
      <span class="upload-cta-sub">ou arraste uma imagem aqui</span>
      <span class="upload-cta-formats">JPG, PNG, WEBP, GIF · máx. 5MB</span>
    </label>
    }
  </div>

  <!-- Preview Actions -->
  @if (hasPreview && !isUploading) {
  <div class="preview-actions">
    <button type="button" class="btn-cancel" (click)="cancelSelection()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
      Cancelar
    </button>
    <button type="button" class="btn-upload" (click)="uploadImage()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
        />
      </svg>
      Fazer Upload
    </button>
  </div>
  }

  <!-- Error Message -->
  @if (errorMessage) {
  <div class="error-message">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
      />
    </svg>
    <span>{{ errorMessage }}</span>
  </div>
  }
</div>
