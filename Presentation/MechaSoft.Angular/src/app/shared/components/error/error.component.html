<div class="error-container">
  <!-- Animated background elements -->
  <div class="background-blob blob-1"></div>
  <div class="background-blob blob-2"></div>

  <div class="error-card">
    <!-- 404 Icon -->
    <div class="error-icon-wrapper">
      <div class="error-icon-glow"></div>
      <div class="error-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
      </div>
    </div>

    <!-- Error Code -->
    <div class="error-content">
      <h1 class="error-code">404</h1>
      <h2 class="error-title">Página Não Encontrada</h2>
      <p class="error-description">
        Oops! A página que você está a procurar não existe ou foi movida.
      </p>
    </div>

    <!-- Action Buttons -->
    <div class="error-actions">
      <a routerLink="/" class="btn-primary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
          />
        </svg>
        <span>Voltar ao Início</span>
      </a>
      <a routerLink="/login" class="btn-secondary">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"
          />
        </svg>
        <span>Fazer Login</span>
      </a>
    </div>

    <!-- Additional Info -->
    <div class="error-footer">
      <p>Se você acredita que isto é um erro, por favor entre em contacto connosco.</p>
    </div>
  </div>
</div>
