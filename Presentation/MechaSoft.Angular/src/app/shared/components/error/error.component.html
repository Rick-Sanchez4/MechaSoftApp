<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 overflow-hidden">
	<!-- Animated background elements -->
	<div class="absolute inset-0">
		<div class="absolute top-1/4 left-1/4 h-96 w-96 rounded-full bg-cyan-500/15 blur-3xl animate-float"></div>
		<div class="absolute bottom-1/4 right-1/4 h-80 w-80 rounded-full bg-red-500/15 blur-3xl animate-float" style="animation-delay: 2s;"></div>
		<div class="absolute top-1/2 left-1/2 h-64 w-64 rounded-full bg-purple-500/15 blur-3xl animate-float" style="animation-delay: 4s;"></div>
	</div>
	
	<!-- Grid pattern overlay -->
	<div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:50px_50px]"></div>
	
	<div class="relative container mx-auto px-4 sm:px-6 lg:px-8">
		<div class="max-w-2xl mx-auto text-center space-y-8">
			<!-- 404 Icon -->
			<div class="relative mb-8">
				<div class="absolute -inset-4 rounded-full bg-gradient-to-r from-red-500/20 to-purple-500/20 blur-2xl animate-pulse-glow"></div>
				<div class="relative inline-flex items-center justify-center w-32 h-32 rounded-full bg-gradient-to-br from-slate-900/80 to-slate-800/80 backdrop-blur-xl border border-slate-800/50 glass-enhanced">
					<svg class="h-16 w-16 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
					</svg>
				</div>
			</div>
			
			<!-- Error Code -->
			<div class="space-y-4">
				<h1 class="text-8xl font-black tracking-tight">
					<span class="bg-gradient-to-r from-red-400 via-pink-500 to-purple-600 bg-clip-text text-transparent">
						404
					</span>
				</h1>
				<h2 class="text-3xl font-bold text-white sm:text-4xl">
					Página Não Encontrada
				</h2>
				<p class="text-lg text-zinc-300 max-w-md mx-auto leading-relaxed">
					Oops! A página que você está a procurar não existe ou foi movida.
				</p>
			</div>
			
			<!-- Action Buttons -->
			<div class="flex flex-col sm:flex-row gap-4 justify-center pt-4">
				<a routerLink="/" class="btn-glow inline-flex items-center justify-center rounded-xl bg-gradient-to-r from-cyan-600 to-blue-700 px-8 py-4 text-base font-semibold text-white shadow-lg transition-all hover:-translate-y-1 hover:shadow-cyan-500/25 hover:from-cyan-500 hover:to-blue-600 animate-pulse-glow">
					<svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
					</svg>
					Voltar ao Início
				</a>
				<a routerLink="/login" class="btn-glow inline-flex items-center justify-center rounded-xl border-2 border-slate-700 bg-transparent px-8 py-4 text-base font-semibold text-white backdrop-blur-sm transition-all hover:-translate-y-1 hover:border-cyan-500 hover:bg-cyan-500/10 glass-enhanced">
					<svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
					</svg>
					Fazer Login
				</a>
			</div>
			
			<!-- Additional Info -->
			<div class="pt-8 border-t border-slate-800/50">
				<p class="text-sm text-zinc-400">
					Se você acredita que isto é um erro, por favor entre em contacto connosco.
				</p>
			</div>
		</div>
	</div>
</div>
