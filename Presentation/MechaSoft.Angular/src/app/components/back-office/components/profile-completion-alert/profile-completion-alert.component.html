@if (isVisible) {
<div class="alert-banner animate-slide-down">
  <div class="alert-container">
    <!-- Icon -->
    <div class="alert-icon">
      <svg class="icon" fill="currentColor" viewBox="0 0 20 20">
        <path
          fill-rule="evenodd"
          d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
          clip-rule="evenodd"
        />
      </svg>
    </div>

    <!-- Content -->
    <div class="alert-content">
      <h3 class="alert-title">Complete o seu perfil de cliente</h3>
      <p class="alert-description">
        Para usufruir de todos os serviços da oficina, precisamos de informações adicionais como nome completo, telefone e morada.
      </p>
    </div>

    <!-- Action Button -->
    <button routerLink="/system/profile" class="alert-btn">
      <span>Completar Agora</span>
      <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </button>

    <!-- Dismiss Button (optional) -->
    @if (isDismissible) {
    <button (click)="dismiss()" class="dismiss-btn" aria-label="Fechar">
      <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    }
  </div>
</div>
}
